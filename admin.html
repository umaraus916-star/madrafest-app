<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ ഫെസ്റ്റ് - അഡ്മിൻ പാനൽ</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .nav-bar { background: #343a40; padding: 10px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 5px 10px; background: #007bff; border-radius: 4px; }
        .nav-title { color: white; font-weight: bold; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .search-box { background: #e9ecef; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn-edit { background: #ffc107; color: black; padding: 5px 10px; font-size: 12px; margin-right: 5px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <span class="nav-title">🕌 മദ്രസ ഫെസ്റ്റ് കൺട്രോൾ പാനൽ</span>
        <a href="/home.html">🏠 Home</a>
    </div>

    <h2>🕌 മദ്രസ ഫെസ്റ്റ് അഡ്മിൻ പോർട്ടൽ</h2>
    <p>ആകെ രജിസ്റ്റർ ചെയ്ത കുട്ടികൾ: <strong id="total-count">0</strong></p>

    <div class="search-box">
        <h3>🔍 വിദ്യാർത്ഥിയെ തിരയുക</h3>
        <input type="text" id="search-input" placeholder="ചെസ്സ് നമ്പറോ പേരോ ടൈപ്പ് ചെയ്യുക..." oninput="searchStudent()">
    </div>

    <div style="background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 6px;">
        <h3 id="form-title">➕ പുതിയ വിദ്യാർത്ഥിയെ ചേർക്കുക</h3>
        <input type="hidden" id="student-key">
        <div class="form-group">
            <label>Chess No / Reg No:</label>
            <input type="text" id="student-id" placeholder="ഉദാഹരണത്തിന്: 231">
        </div>
        <div class="form-group">
            <label>വിദ്യാർത്ഥിയുടെ പേര്:</label>
            <input type="text" id="student-name" placeholder="പേര് ടൈപ്പ് ചെയ്യുക">
        </div>
        <div class="form-group">
            <label>ടീം (Team):</label>
            <input type="text" id="student-team" placeholder="ടീമിന്റെ പേര്">
        </div>
        <button id="save-btn" onclick="saveStudent()">സേവ് ചെയ്യുക</button>
        <button id="cancel-btn" style="background:#6c757d; display:none;" onclick="resetForm()">ഒഴിവാക്കുക</button>
    </div>

    <h3>📋 വിദ്യാർത്ഥികളുടെ ലിസ്റ്റ്</h3>
    <table>
        <thead>
            <tr>
                <th>Chess No</th>
                <th>പേര്</th>
                <th>ടീം</th>
                <th>നടപടികൾ</th>
            </tr>
        </thead>
        <tbody id="students-table-body"></tbody>
    </table>
</div>

<script>
    let allStudents = [];
    async function fetchStudents() {
        try {
            const res = await fetch('/api/students');
            allStudents = await res.json();
            document.getElementById('total-count').innerText = allStudents.length;
            renderTable(allStudents);
        } catch (e) { console.error(e); }
    }
    function renderTable(data) {
        const tbody = document.getElementById('students-table-body');
        tbody.innerHTML = '';
        data.forEach(student => {
            tbody.innerHTML += `<tr><td><strong>${student.id}</strong></td><td>${student.name}</td><td>${student.team || '-'}</td><td><button class="btn-edit" onclick="editStudent('${student.id}')">തിരുത്തുക</button><button class="btn-delete" onclick="deleteStudent('${student.id}')">ഡിലീറ്റ്</button></td></tr>`;
        });
    }
    function searchStudent() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        if(!query) { renderTable(allStudents); return; }
        const filtered = allStudents.filter(s => s.id === query || s.name.toLowerCase().includes(query));
        renderTable(filtered);
    }
    function editStudent(id) {
        const student = allStudents.find(s => s.id === id);
        if(student) {
            document.getElementById('student-key').value = student.id;
            document.getElementById('student-id').value = student.id;
            document.getElementById('student-id').disabled = true;
            document.getElementById('student-name').value = student.name;
            document.getElementById('student-team').value = student.team || '';
            document.getElementById('form-title').innerText = "📝 വിവരങ്ങൾ തിരുത്തുക";
            document.getElementById('save-btn').innerText = "മാറ്റങ്ങൾ സേവ് ചെയ്യുക";
            document.getElementById('cancel-btn').style.display = "inline-block";
        }
    }
    function resetForm() {
        document.getElementById('student-key').value = '';
        document.getElementById('student-id').value = '';
        document.getElementById('student-id').disabled = false;
        document.getElementById('student-name').value = '';
        document.getElementById('student-team').value = '';
        document.getElementById('form-title').innerText = "➕ പുതിയ വിദ്യാർത്ഥിയെ ചേർക്കുക";
        document.getElementById('save-btn').innerText = "സേവ് ചെയ്യുക";
        document.getElementById('cancel-btn').style.display = "none";
    }
    async function saveStudent() {
        const id = document.getElementById('student-id').value.trim();
        const name = document.getElementById('student-name').value.trim();
        const team = document.getElementById('student-team').value.trim();
        const editKey = document.getElementById('student-key').value;
        if(!id || !name) { alert("ചെസ്സ് നമ്പറും പേരും വേണം!"); return; }
        const studentData = { id, name, team, item: "-" };
        let url = editKey ? `/api/students/${editKey}` : '/api/students';
        let method = editKey ? 'PUT' : 'POST';
        if(!editKey && allStudents.some(s => s.id === id)) { alert("ഈ ചെസ്സ് നമ്പർ നിലവിലുണ്ട്!"); return; }
        const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(studentData) });
        if(res.ok) { resetForm(); setTimeout(fetchStudents, 500); }
    }
    async function deleteStudent(id) {
        if(confirm("ഈ കുട്ടിയെ ഒഴിവാക്കണോ?")) {
            const res = await fetch(`/api/students/${id}`, { method: 'DELETE' });
            if(res.ok) setTimeout(fetchStudents, 500);
        }
    }
    fetchStudents();
</script>
</body>
</html>
