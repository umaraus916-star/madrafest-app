<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ ഫെസ്റ്റ് - മത്സരങ്ങൾ ചേർക്കുക</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; }
        .nav-bar { background: #343a40; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 6px 15px; background: #007bff; border-radius: 4px; }
        .nav-title { color: white; font-weight: bold; font-size: 18px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        
        /* ഗ്രൂപ്പുകളുടെ സ്റ്റൈൽ */
        .group-selection { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .group-btn { padding: 12px 25px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; width: 30%; min-width: 100px; }
        .btn-badhr { background-color: #28a745; }
        .btn-uhadh { background-color: #dc3545; }
        .btn-hunayn { background-color: #ffc107; color: #333; }
        .group-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .group-btn.active { outline: 3px solid #007bff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* ഫോം സെക്ഷൻ സ്റ്റൈൽ */
        .form-section { display: none; background: #fff; border: 2px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        .readonly-box { background-color: #e2e8f0; font-weight: bold; color: #475569; }
        
        /* മത്സരങ്ങൾ ചെക്ക്ബോക്സ് രൂപത്തിൽ കാണിക്കാൻ */
        .events-checkbox-container { display: none; background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px; border-radius: 6px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; font-size: 16px; }
        .checkbox-item input { width: auto; margin-right: 12px; transform: scale(1.3); cursor: pointer; }
        
        .submit-btn { width: 100%; background: #28a745; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        
        #status-message { margin-top: 6px; font-size: 14px; font-weight: bold; }
        .info-msg { color: #28a745; }
        .error-msg { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <span class="nav-title">➕ മത്സരങ്ങൾ ചേർക്കുക</span>
        <a href="/home.html">🏠 Home</a>
    </div>

    <h2>🕌 മദ്രസ ഫെസ്റ്റ് - മത്സര രജിസ്ട്രേഷൻ</h2>
    <p style="text-align: center; color: #666;">തുടങ്ങാനായി ആദ്യം ഏതെങ്കിലും ഒരു ഗ്രൂപ്പ് തിരഞ്ഞെടുക്കുക</p>
    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">

    <div class="group-selection">
        <button class="group-btn btn-badhr" onclick="selectMadrasaGroup('ബദർ', this)">ബദർ (Badhar)</button>
        <button class="group-btn btn-uhadh" onclick="selectMadrasaGroup('ഉഹ്ദ്', this)">ഉഹ്ദ് (Uhadh)</button>
        <button class="group-btn btn-hunayn" onclick="selectMadrasaGroup('ഹുനൈൻ', this)">ഹുനൈൻ (Hunayn)</button>
    </div>

    <div id="form-container" class="form-section">
        <h3 style="margin-top:0; color:#1e293b;">📝 വിവരങ്ങൾ ചേർക്കുക: <span id="selected-group-text" style="color:#007bff;"></span></h3>
        
        <form id="add-event-form">
            <div class="form-group">
                <label>Chess No / Reg No (ചെസ്സ് നമ്പർ):</label>
                <input type="text" id="student-id" placeholder="ചെസ്സ് നമ്പർ ടൈപ്പ് ചെയ്യുക" oninput="fetchStudentNameOnly()">
                <div id="status-message"></div>
            </div>

            <div class="form-group">
                <label>വിദ്യാർത്ഥിയുടെ പേര്:</label>
                <input type="text" id="student-name" class="readonly-box" placeholder="ചെസ്സ് നമ്പർ അടിക്കുമ്പോൾ തനിയെ വരും" readonly>
            </div>

            <div class="form-group">
                <label>വിഭാഗം (Gender):</label>
                <select id="student-gender">
                    <option value="">തിരഞ്ഞെടുക്കുക</option>
                    <option value="ആൺകുട്ടി">ആൺകുട്ടി (Boys)</option>
                    <option value="പെൺകുട്ടി">പെൺകുട്ടി (Girls)</option>
                </select>
            </div>

            <div class="form-group">
                <label>വിഭാഗം (Category):</label>
                <select id="student-category" onchange="showCategoryEvents()">
                    <option value="">തിരഞ്ഞെടുക്കുക</option>
                    <option value="കിഡ്സ്">കിഡ്സ് (Kids)</option>
                    <option value="സബ് ജൂനിയർ">സബ് ജൂനിയർ (Sub Junior)</option>
                    <option value="ജൂനിയർ">ജൂനിയർ (Junior)</option>
                    <option value="സീനിയർ">സീനിയർ (Senior)</option>
                </select>
            </div>

            <div class="form-group">
                <label id="checkbox-label" style="display:none;">പങ്കെടുക്കുന്ന മത്സരങ്ങൾ തിരഞ്ഞെടുക്കുക (ഒന്നിൽ കൂടുതൽ സെലക്ട് ചെയ്യാം):</label>
                <div id="events-checkbox-list" class="events-checkbox-container"></div>
            </div>

            <button type="button" class="submit-btn" onclick="submitEvent()">ഗ്രൂപ്പും മത്സരവും സേവ് ചെയ്യുക</button>
        </form>
    </div>
</div>

<script>
    const eventData = {
        "കിഡ്സ്": ["കേട്ടെഴുത്ത്", "കളറിംഗ്", "കസേരക്കളി", "മെമ്മറി ടെസ്റ്റ്"],
        "സബ് ജൂനിയർ": ["വായന അറബി മലയാളം", "കയ്യെഴുത്ത്", "കേട്ടെഴുത്ത് (അറബി മലയാളം)", "ചിത്ര രചന", "ക്വിസ്"],
        "ജൂനിയർ": ["മാലപ്പാട്ട്", "മൗലീദ് പാരായണം", "ചിത്ര രചന", "ക്വിസ്", "കഥാ രചന", "കേട്ടെഴുത്ത് (അറബി മലയാളം)", "വായന അറബി"],
        "സീനിയർ": ["മാലപ്പാട്ട്", "മൗലീദ് പാരായണം", "ബുർദ", "ക്വിസ്", "കവിത രചന", "ചിത്ര രചന", "കാലിഗ്രാഫി", "പ്രബന്ധ രചന"]
    };

    let currentSelectedGroup = "";

    function selectMadrasaGroup(groupName, btn) {
        currentSelectedGroup = groupName;
        
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.getElementById('selected-group-text').textContent = `${groupName} ടീമിലേക്ക് ചേർക്കുക`;
        document.getElementById('form-container').style.display = "block";
        
        document.getElementById('add-event-form').reset();
        document.getElementById('status-message').innerHTML = '';
        document.getElementById('checkbox-label').style.display = "none";
        document.getElementById('events-checkbox-list').style.display = "none";
    }

    // ചെസ്സ് നമ്പർ അടിക്കുമ്പോൾ സിസ്റ്റത്തിലുള്ള ഏത് കുട്ടിയെയും കണ്ടെത്തുന്നു
    async function fetchStudentNameOnly() {
        const idInput = document.getElementById('student-id').value.trim();
        const nameInput = document.getElementById('student-name');
        const statusMsg = document.getElementById('status-message');

        if (!idInput) {
            nameInput.value = ''; statusMsg.innerHTML = '';
            return;
        }

        try {
            const res = await fetch('/api/students');
            const students = await res.json();
            const student = students.find(s => s.id === idInput || s.id === Number(idInput).toString());

            if (student) {
                nameInput.value = student.name || '';
                statusMsg.innerHTML = `<span class="info-msg">✓ കുട്ടിയെ കണ്ടെത്തി: ${student.name}</span>`;
            } else {
                nameInput.value = '';
                statusMsg.innerHTML = `<span class="error-msg">❌ ഈ ചെസ്സ് നമ്പറിൽ കുട്ടിയെ കണ്ടെത്തിയില്ല!</span>`;
            }
        } catch (error) {
            console.error(error);
        }
    }

    function showCategoryEvents() {
        const category = document.getElementById('student-category').value;
        const checkboxContainer = document.getElementById('events-checkbox-list');
        const checkboxLabel = document.getElementById('checkbox-label');
        
        checkboxContainer.innerHTML = "";
        
        if (category && eventData[category]) {
            checkboxLabel.style.display = "block";
            checkboxContainer.style.display = "block";
            
            eventData[category].forEach(item => {
                const label = document.createElement('label');
                label.className = "checkbox-item";
                
                const checkbox = document.createElement('input');
                checkbox.type = "checkbox";
                checkbox.name = "student-events";
                checkbox.value = item;
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(item));
                
                checkboxContainer.appendChild(label);
            });
        } else {
            checkboxLabel.style.display = "none";
            checkboxContainer.style.display = "none";
        }
    }

    // സബ്മിറ്റ് ചെയ്യുമ്പോൾ ഗ്രൂപ്പ് വിവരങ്ങളടക്കം ബാക്കെൻഡിലേക്ക് അയക്കുന്നു
    async function submitEvent() {
        const id = document.getElementById('student-id').value;
        const name = document.getElementById('student-name').value;
        const gender = document.getElementById('student-gender').value;
        const category = document.getElementById('student-category').value;
        
        const selectedCheckboxes = document.querySelectorAll('input[name="student-events"]:checked');
        const selectedEvents = Array.from(selectedCheckboxes).map(cb => cb.value);

        if (!id || !name || !gender || !category) {
            alert("ദയവായി എല്ലാ വിവരങ്ങളും പൂർണ്ണമായി പൂരിപ്പിക്കുക!");
            return;
        }

        if (selectedEvents.length === 0) {
            alert("ദയവായി കുറഞ്ഞത് ഒരു മത്സരമെങ്കിലും തിരഞ്ഞെടുക്കുക!");
            return;
        }

        const payload = {
            id: id,
            team: currentSelectedGroup, // മുകളിൽ സെലക്ട് ചെയ്ത ഗ്രൂപ്പ് ഇവിടെയാണ് സേവ് ചെയ്യുന്നത്
            gender: gender,
            category: category,
            events: selectedEvents
        };

        try {
            const response = await fetch('/api/register-event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.success) {
                alert(`വിജയകരം!\n\n${name} എന്ന കുട്ടിയെ "${currentSelectedGroup}" ഗ്രൂപ്പിൽ ഉൾപ്പെടുത്തുകയും താഴെ പറയുന്ന മത്സരങ്ങൾ ആഡ് ചെയ്യുകയും ചെയ്തു:\n\n${selectedEvents.join(", ")}`);
                
                // റീസെറ്റ് ചെയ്യൽ
                document.getElementById('add-event-form').reset();
                document.getElementById('status-message').innerHTML = '';
                document.getElementById('checkbox-label').style.display = "none";
                document.getElementById('events-checkbox-list').style.display = "none";
                document.getElementById('form-container').style.display = "none";
                document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            console.error(error);
            alert("സേവ് ചെയ്യാൻ സാധിച്ചില്ല. നെറ്റ്‌വർക്ക് പരിശോധിക്കുക.");
        }
    }
</script>
</body>
</html>
