<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ ഫെസ്റ്റ് - മത്സരങ്ങൾ ചേർക്കുക</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; }
        .nav-bar { background: #343a40; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 6px 15px; background: #007bff; border-radius: 4px; }
        .nav-title { color: white; font-weight: bold; font-size: 18px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        
        /* ഗ്രൂപ്പുകളുടെ സ്റ്റൈൽ */
        .group-selection { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .group-btn { padding: 12px 25px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-badhr { background-color: #28a745; } /* പച്ച */
        .btn-uhadh { background-color: #dc3545; } /* ചുവപ്പ് */
        .btn-hunayn { background-color: #ffc107; color: #333; } /* മഞ്ഞ */
        .group-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .group-btn.active { outline: 3px solid #007bff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* ഫോം സെക്ഷൻ സ്റ്റൈൽ */
        .form-section { display: none; background: #fff; border: 2px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        .readonly-box { background-color: #e2e8f0; font-weight: bold; color: #475569; }
        .submit-btn { width: 100%; background: #28a745; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        
        #status-message { margin-top: 6px; font-size: 14px; font-weight: bold; }
        .info-msg { color: #28a745; }
        .error-msg { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <span class="nav-title">➕ മത്സരങ്ങൾ ചേർക്കുക</span>
        <a href="/home.html">🏠 Home</a>
    </div>

    <h2>🕌 മദ്രസ ഫെസ്റ്റ് - മത്സര രജിസ്ട്രേഷൻ</h2>
    <p style="text-align: center; color: #666;">തുടങ്ങാനായി ആദ്യം ഏതെങ്കിലും ഒരു ഗ്രൂപ്പ് തിരഞ്ഞെടുക്കുക</p>
    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">

    <div class="group-selection">
        <button class="group-btn btn-badhr" onclick="selectMadrasaGroup('ബദർ', this)">ബദർ (Badhar)</button>
        <button class="group-btn btn-uhadh" onclick="selectMadrasaGroup('ഉഹ്ദ്', this)">ഉഹ്ദ് (Uhadh)</button>
        <button class="group-btn btn-hunayn" onclick="selectMadrasaGroup('ഹുനൈൻ', this)">ഹുനൈൻ (Hunayn)</button>
    </div>

    <div id="form-container" class="form-section">
        <h3 style="margin-top:0; color:#1e293b;">📝 മത്സരങ്ങൾ ആഡ് ചെയ്യുക: <span id="selected-group-text" style="color:#007bff;"></span></h3>
        
        <form id="add-event-form">
            <div class="form-group">
                <label>Chess No / Reg No (ചെസ്സ് നമ്പർ):</label>
                <input type="text" id="student-id" placeholder="ചെസ്സ് നമ്പർ ടൈപ്പ് ചെയ്യുമ്പോൾ മറ്റ് വിവരങ്ങൾ വരും" oninput="fetchStudentDetailsByGroup()">
                <div id="status-message"></div>
            </div>

            <div class="form-group">
                <label>വിദ്യാര്ത്ഥിയുടെ പേര്:</label>
                <input type="text" id="student-name" class="readonly-box" placeholder="ഓട്ടോമാറ്റിക്കായി വരും" readonly>
            </div>

            <div class="form-group">
                <label>വിഭാഗം (Category):</label>
                <input type="text" id="student-category" class="readonly-box" placeholder="ഓട്ടോമാറ്റിക്കായി വരും" readonly>
            </div>

            <div class="form-group">
                <label>മത്സര ഇനം (Event Item):</label>
                <select id="event-item">
                    <option value="">മത്സരം തിരഞ്ഞെടുക്കുക</option>
                    <option value="കേട്ടെഴുത്ത്">കേട്ടെഴുത്ത്</option>
                    <option value="കളറിംഗ്">കളറിംഗ്</option>
                    <option value="കസേരക്കളി">കസേരക്കളി</option>
                    <option value="മെമ്മറി ടെസ്റ്റ്">മെമ്മറി ടെസ്റ്റ്</option>
                    <option value="വായന അറബി മലയാളം">വായന അറബി മലയാളം</option>
                    <option value="കയ്യെഴുത്ത്">കയ്യെഴുത്ത്</option>
                    <option value="കേട്ടെഴുത്ത് (അറബി മലയാളം)">കേട്ടെഴുത്ത് (അറബി മലയാളം)</option>
                    <option value="ചിത്ര രചന">ചിത്ര രചന</option>
                    <option value="ക്വിസ്">ക്വിസ്</option>
                    <option value="മാലപ്പാട്ട്">മാലപ്പാട്ട്</option>
                    <option value="മൗലീദ് പാരായണം">മൗലീദ് പാരായണം</option>
                    <option value="കഥാ രചന">കഥാ രചന</option>
                    <option value="വായന അറബി">വായന അറബി</option>
                    <option value="ബുർദ">ബുർദ</option>
                    <option value="കവിത രചന">കവിത രചന</option>
                    <option value="കാലിഗ്രാഫി">കാലിഗ്രാഫി</option>
                    <option value="പ്രബന്ധ രചന">പ്രബന്ധ രചന</option>
                </select>
            </div>

            <button type="button" class="submit-btn" onclick="submitEvent()">മത്സരം ആഡ് ചെയ്യുക</button>
        </form>
    </div>
</div>

<script>
    let currentSelectedGroup = "";

    // 1. ഗ്രൂപ്പ് ബട്ടൺ ഞെക്കുമ്പോൾ ഫോം ഓപ്പൺ ആക്കാൻ
    function selectMadrasaGroup(groupName, btn) {
        currentSelectedGroup = groupName;
        
        // ബട്ടണുകൾക്ക് ആക്റ്റീവ് സ്റ്റൈൽ നൽകാൻ
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // ഫോം കാണിക്കുക
        document.getElementById('selected-group-text').textContent = groupName + " Team";
        document.getElementById('form-container').style.display = "block";
        
        // മുൻപ് അടിച്ച ഡാറ്റകൾ ഉണ്ടെങ്കിൽ ക്ലിയർ ചെയ്യാൻ
        document.getElementById('add-event-form').reset();
        document.getElementById('status-message').innerHTML = '';
    }

    // 2. ചെസ്സ് നമ്പർ അടിക്കുമ്പോൾ ആ ഗ്രൂപ്പിലുള്ള കുട്ടിയുടെ പേരും കാറ്റഗറിയും തനിയെ വരാൻ
    async function fetchStudentDetailsByGroup() {
        const idInput = document.getElementById('student-id').value.trim();
        const nameInput = document.getElementById('student-name');
        const categoryInput = document.getElementById('student-category');
        const statusMsg = document.getElementById('status-message');

        if (!idInput) {
            nameInput.value = ''; categoryInput.value = ''; statusMsg.innerHTML = '';
            return;
        }

        try {
            const res = await fetch('/api/students');
            const students = await res.json();
            
            // ചെസ്സ് നമ്പറും നമ്മൾ തിരഞ്ഞെടുത്ത ഗ്രൂപ്പും മാച്ച് ചെയ്യുന്ന കുട്ടിയെ കണ്ടെത്തുന്നു
            const student = students.find(s => 
                (s.id === idInput || s.id === Number(idInput).toString()) && 
                (s.team === currentSelectedGroup)
            );

            if (student) {
                nameInput.value = student.name || '';
                categoryInput.value = student.category || 'ജനറൽ';
                statusMsg.innerHTML = `<span class="info-msg">✓ കുട്ടിയെ കണ്ടെത്തി! (${currentSelectedGroup} Team)</span>`;
            } else {
                nameInput.value = ''; categoryInput.value = '';
                statusMsg.innerHTML = `<span class="error-msg">❌ ഈ ഗ്രൂപ്പിൽ (${currentSelectedGroup}) ഈ ചെസ്സ് നമ്പറുള്ള കുട്ടിയെ കണ്ടെത്തിയില്ല!</span>`;
            }
        } catch (error) {
            console.error(error);
        }
    }

    // സേവ് ചെയ്യുമ്പോൾ
    function submitEvent() {
        const id = document.getElementById('student-id').value;
        const name = document.getElementById('student-name').value;
        const item = document.getElementById('event-item').value;

        if (!id || !name || !item) {
            alert("ദയവായി സാധുവായ ചെസ്സ് നമ്പറും മത്സര ഇനവും നൽകുക!");
            return;
        }

        alert(`${name} എന്ന കുട്ടിയെ "${item}" എന്ന മത്സരത്തിലേക്ക് വിജയകരമായി ചേർത്തു!`);
        
        // ഫോം റീസെറ്റ് ചെയ്യുക
        document.getElementById('add-event-form').reset();
        document.getElementById('status-message').innerHTML = '';
    }
</script>
</body>
</html>
