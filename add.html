<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ ഫെസ്റ്റ് - മത്സരങ്ങൾ ചേർക്കുക</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; }
        .nav-bar { background: #343a40; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 6px 15px; background: #007bff; border-radius: 4px; }
        .nav-title { color: white; font-weight: bold; font-size: 18px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        
        /* കാറ്റഗറി ഗ്രൂപ്പുകളുടെ സ്റ്റൈൽ */
        .category-grid { display: block; margin-bottom: 25px; text-align: center; }
        .cat-btn { background: #34495e; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.3s; }
        .cat-btn:hover { background: #2c3e50; }
        .cat-btn.active { background: #007bff; }

        /* മത്സരങ്ങളുടെ ലിസ്റ്റ് സ്റ്റൈൽ */
        .items-section { display: none; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .item-list-btn { background: white; color: #334155; border: 1px solid #cbd5e1; padding: 10px 15px; margin: 5px; border-radius: 4px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .item-list-btn:hover { background: #e2e8f0; }
        .item-list-btn.active { background: #28a745; color: white; border-color: #28a745; }

        /* രജിസ്ട്രേഷൻ ഫോം സ്റ്റൈൽ */
        .form-section { display: none; background: #fff; border: 2px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        .readonly-box { background-color: #e2e8f0; font-weight: bold; color: #475569; }
        .submit-btn { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        
        #status-message { margin-top: 6px; font-size: 14px; font-weight: bold; }
        .info-msg { color: #28a745; }
        .error-msg { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <span class="nav-title">➕ മത്സരങ്ങൾ ചേർക്കുക</span>
        <a href="/home.html">🏠 Home</a>
    </div>

    <h2>🕌 മദ്രസ ഫെസ്റ്റ് - മത്സര രജിസ്ട്രേഷൻ</h2>
    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">

    <div class="category-grid">
        <button class="cat-btn" onclick="selectCategory('കിഡ്സ്', this)">കിഡ്സ് (Kids)</button>
        <button class="cat-btn" onclick="selectCategory('സബ് ജൂനിയർ', this)">സബ് ജൂനിയർ</button>
        <button class="cat-btn" onclick="selectCategory('ജൂനിയർ', this)">ജൂനിയർ</button>
        <button class="cat-btn" onclick="selectCategory('സീനിയർ', this)">സീനിയർ</button>
    </div>

    <div id="items-container" class="items-section">
        <h3 style="margin-top:0; color:#475569;">📋 മത്സര ഇനം തിരഞ്ഞെടുക്കുക:</h3>
        <div id="items-list"></div>
    </div>

    <div id="form-container" class="form-section">
        <h3 style="margin-top:0; color:#1e293b;">📝 രജിസ്റ്റർ ചെയ്യുക: <span id="selected-display-text" style="color:#007bff;"></span></h3>
        
        <form id="add-event-form">
            <div class="form-group">
                <label>Chess No / Reg No (ചെസ്സ് നമ്പർ):</label>
                <input type="text" id="student-id" placeholder="ചെസ്സ് നമ്പർ ടൈപ്പ് ചെയ്യുക" oninput="fetchStudentAllDetails()">
                <div id="status-message"></div>
            </div>

            <div class="form-group">
                <label>വിദ്യാർത്ഥിയുടെ പേര്:</label>
                <input type="text" id="student-name" class="readonly-box" placeholder="ഓട്ടോമാറ്റിക്കായി വരും" readonly>
            </div>

            <div class="form-group">
                <label>ഗ്രൂപ്പ് / ടീം:</label>
                <input type="text" id="student-team" class="readonly-box" placeholder="ഓട്ടോമാറ്റിക്കായി വരും" readonly>
            </div>

            <button type="button" class="submit-btn" onclick="submitEvent()">മത്സരം ആഡ് ചെയ്യുക</button>
        </form>
    </div>
</div>

<script>
    // 📋 മത്സരങ്ങളുടെ ഡാറ്റാബേസ്
    const eventData = {
        "കിഡ്സ്": ["കേട്ടെഴുത്ത്", "കളറിംഗ്", "കസേരക്കളി", "മെമ്മറി ടെസ്റ്റ്"],
        "സബ് ജൂനിയർ": ["വായന അറബി മലയാളം", "കയ്യെഴുത്ത്", "കേട്ടെഴുത്ത് (അറബി മലയാളം)", "ചിത്ര രചന", "ക്വിസ്"],
        "ജൂനിയർ": ["മാലപ്പാട്ട്", "മൗലീദ് പാരായണം", "ചിത്ര രചന", "ക്വിസ്", "കഥാ രചന", "കേട്ടെഴുത്ത് (അറബി മലയാളം)", "വായന അറബി"],
        "സീനിയർ": ["മാലപ്പാട്ട്", "മൗലീദ് പാരായണം", "ബുർദ", "ക്വിസ്", "കവിത രചന", "ചിത്ര രചന", "കാലിഗ്രാഫി", "പ്രബന്ധ രചന"]
    };

    let selectedCategory = "";
    let selectedItem = "";

    // 1. ഗ്രൂപ്പ് ക്ലിക്ക് ചെയ്യുമ്പോൾ മത്സരങ്ങൾ കാണിക്കാൻ
    function selectCategory(cat, btn) {
        selectedCategory = cat;
        selectedItem = "";
        
        // ബട്ടൺ ആക്റ്റീവ് ആക്കാൻ
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // ഫോം തൽക്കാലം ഒളിപ്പിക്കുക
        document.getElementById('form-container').style.display = "none";
        document.getElementById('add-event-form').reset();
        document.getElementById('status-message').innerHTML = '';

        // മത്സരങ്ങളുടെ ലിസ്റ്റ് ഉണ്ടാക്കുക
        const listDiv = document.getElementById('items-list');
        listDiv.innerHTML = "";
        
        if (eventData[cat]) {
            eventData[cat].forEach(item => {
                const itemBtn = document.createElement('button');
                itemBtn.className = "item-list-btn";
                itemBtn.textContent = item;
                itemBtn.onclick = function() { selectItem(item, itemBtn); };
                listDiv.appendChild(itemBtn);
            });
            document.getElementById('items-container').style.display = "block";
        }
    }

    // 2. മത്സരം ക്ലിക്ക് ചെയ്യുമ്പോൾ ഫോം കാണിക്കാൻ
    function selectItem(item, btn) {
        selectedItem = item;
        document.querySelectorAll('.item-list-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // ടെക്സ്റ്റ് മാറ്റുക, ഫോം കാണിക്കുക
        document.getElementById('selected-display-text').textContent = `${selectedCategory} -> ${selectedItem}`;
        document.getElementById('form-container').style.display = "block";
        
        // മുൻപ് അടിച്ച ഡാറ്റ ഉണ്ടെങ്കിൽ ക്ലിയർ ചെയ്യാൻ
        document.getElementById('student-id').value = "";
        document.getElementById('student-name').value = "";
        document.getElementById('student-team').value = "";
        document.getElementById('status-message').innerHTML = "";
    }

    // 3. ചെസ്സ് നമ്പർ അടിക്കുമ്പോൾ പേരും ഗ്രൂപ്പും തനിയെ വരാൻ
    async function fetchStudentAllDetails() {
        const idInput = document.getElementById('student-id').value.trim();
        const nameInput = document.getElementById('student-name');
        const teamInput = document.getElementById('student-team');
        const statusMsg = document.getElementById('status-message');

        if (!idInput) {
            nameInput.value = ''; teamInput.value = ''; statusMsg.innerHTML = '';
            return;
        }

        try {
            const res = await fetch('/api/students');
            const students = await res.json();
            const student = students.find(s => s.id === idInput || s.id === Number(idInput).toString());

            if (student) {
                nameInput.value = student.name || '';
                teamInput.value = student.team || '-';
                statusMsg.innerHTML = `<span class="info-msg">✓ വിദ്യാർത്ഥിയെ കണ്ടെത്തി!</span>`;
            } else {
                nameInput.value = ''; teamInput.value = '';
                statusMsg.innerHTML = '<span class="error-msg">❌ ഈ ചെസ്സ് നമ്പറിൽ കുട്ടിയെ കണ്ടെത്തിയില്ല!</span>';
            }
        } catch (error) {
            console.error(error);
        }
    }

    // സേവ് ചെയ്യുമ്പോൾ
    function submitEvent() {
        const id = document.getElementById('student-id').value;
        const name = document.getElementById('student-name').value;

        if (!id || !name) {
            alert("ദയവായി സാധുവായ ചെസ്സ് നമ്പർ നൽകുക!");
            return;
        }

        alert(`${name} എന്ന കുട്ടിയെ "${selectedItem}" എന്ന മത്സരത്തിലേക്ക് വിജയകരമായി ചേർത്തു!`);
        
        // റീസെറ്റ് ചെയ്യുക
        document.getElementById('add-event-form').reset();
        document.getElementById('status-message').innerHTML = '';
        document.getElementById('form-container').style.display = "none";
        document.querySelectorAll('.item-list-btn').forEach(b => b.classList.remove('active'));
    }
</script>
</body>
</html>
