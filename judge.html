<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ ഫെസ്റ്റ് - ജഡ്ജിങ് പാനൽ</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; background: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0069d9; }
        .info-msg { color: #28a745; font-weight: bold; margin-top: 5px; }
        .error-msg { color: #dc3545; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚖️ മദ്രസ ഫെസ്റ്റ് - ജഡ്ജിങ് പാനൽ</h2>
    <hr>
    
    <form id="judge-form">
        <div class="form-group">
            <label>Chess No / Reg No:</label>
            <input type="text" id="student-id" placeholder="ഉദാഹരണത്തിന്: 78" oninput="fetchStudentName()">
            <div id="status-message"></div>
        </div>

        <div class="form-group">
            <label>വിദ്യാർത്ഥിയുടെ പേര് (Auto-Fill):</label>
            <input type="text" id="student-name" placeholder="ചെസ്സ് നമ്പർ അടിക്കുമ്പോൾ പേര് ഇവിടെ വരും" readonly style="background-color: #e9ecef; font-weight: bold; color: #495057;">
        </div>

        <div class="form-group">
            <label>മത്സര ഇനം (Item):</label>
            <input type="text" id="event-item" placeholder="ഇനത്തിന്റെ പേര്">
        </div>

        <div class="form-group">
            <label>മാർക്ക് (Mark):</label>
            <input type="number" id="student-mark" placeholder="മാർക്ക് നൽകുക" min="0" max="100">
        </div>

        <button type="button" onclick="submitMark()">മാർക്ക് സബ്മിറ്റ് ചെയ്യുക</button>
    </form>
</div>

<script>
    // 🔍 ചെസ്സ് നമ്പർ അടിക്കുമ്പോൾ പേര് തനിയെ എടുക്കാനുള്ള ഫങ്ഷൻ
    async function fetchStudentName() {
        const idInput = document.getElementById('student-id').value.trim();
        const nameInput = document.getElementById('student-name');
        const statusMsg = document.getElementById('status-message');

        if (!idInput) {
            nameInput.value = '';
            statusMsg.innerHTML = '';
            return;
        }

        try {
            // നമ്മൾ ഉണ്ടാക്കിയ എപിഐയിലേക്ക് കണക്ട് ചെയ്യുന്നു
            const res = await fetch('/api/students');
            const students = await res.json();

            // ടൈപ്പ് ചെയ്ത ഐഡിയുള്ള കുട്ടിയെ കണ്ടെത്തുന്നു
            const student = students.find(s => s.id === idInput);

            if (student) {
                nameInput.value = student.name;
                statusMsg.innerHTML = `<span class="info-msg">✓ കുട്ടിയെ കണ്ടെത്തി: ${student.team || ''} Team</span>`;
            } else {
                nameInput.value = '';
                statusMsg.innerHTML = '<span class="error-msg">❌ ഈ ചെസ്സ് നമ്പറിൽ കുട്ടിയെ കണ്ടെത്തിയില്ല!</span>';
            }
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // മാർക്ക് സബ്മിറ്റ് ചെയ്യുമ്പോൾ (ആവശ്യമെങ്കിൽ ബാക്കെൻഡിലേക്ക് വിടാം)
    function submitMark() {
        const id = document.getElementById('student-id').value;
        const name = document.getElementById('student-name').value;
        const mark = document.getElementById('student-mark').value;

        if (!id || !name || !mark) {
            alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി പൂരിപ്പിക്കുക!");
            return;
        }

        alert(`${name} (Chess No: ${id}) എന്ന കുട്ടിക്ക് ${mark} മാർക്ക് രേഖപ്പെടുത്തി!`);
        document.getElementById('judge-form').reset();
        document.getElementById('status-message').innerHTML = '';
    }
</script>

</body>
</html>
