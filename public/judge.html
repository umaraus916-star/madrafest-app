<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .judge-container { background: white; max-width: 450px; margin: 30px auto; padding: 25px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); text-align: right; }
        h2 { color: #2c3e50; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; text-align: right; }
        input[type="text"] { text-align: left; }
        button { background-color: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; text-align: center; margin-top: 15px; }
        button:hover { background-color: #c0392b; }
        .student-info { font-weight: bold; margin: 15px 0; color: #2c3e50; font-size: 18px; text-align: center; min-height: 25px; }
        .msg { font-weight: bold; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="judge-container">
    <h2>👨‍⚖️ ജഡ്ജിങ് പാനൽ</h2>
    
    <label>ചെസ്റ്റ് നമ്പർ:</label>
    <input type="text" id="chestNumber" placeholder="Chest Number ടൈപ്പ് ചെയ്യുക" oninput="findStudent()">
    
    <div id="studentDisplay" class="student-info"></div>

    <label>മത്സരയിനം സെലക്ട് ചെയ്യുക (Item):</label>
    <select id="itemSelect" required>
        <option value="">ആദ്യം ചെസ്റ്റ് നമ്പർ അടിക്കുക</option>
    </select>
    
    <label>സ്ഥാനം (Place - ഓപ്ഷണൽ):</label>
    <select id="place">
        <option value="">സ്ഥാനമില്ല (None)</option>
        <option value="1">First Place (ഒന്നാം സ്ഥാനം)</option>
        <option value="2">Second Place (രണ്ടാം സ്ഥാനം)</option>
        <option value="3">Third Place (മൂന്നാം സ്ഥാനം)</option>
    </select>

    <label>ഗ്രേഡ് (Grade):</label>
    <select id="grade">
        <option value="">ഗ്രേഡില്ല (None)</option>
        <option value="A+">A+ Grade</option>
        <option value="A">A Grade</option>
        <option value="B">B Grade</option>
        <option value="C">C Grade</option>
    </select>
    
    <button onclick="submitJudgement()">Submit Result</button>
    <div id="msg" class="msg"></div>
</div>

<script>
    let allStudents = [];

    async function fetchStudents() {
        const response = await fetch('/api/results-all');
        if(response.ok) {
            allStudents = await response.json();
        }
    }
    fetchStudents();

    function findStudent() {
        const chest = document.getElementById('chestNumber').value.trim();
        const display = document.getElementById('studentDisplay');
        const itemSelect = document.getElementById('itemSelect');
        
        // ചെസ്റ്റ് നമ്പർ അടിസ്ഥാനമാക്കി മത്സരങ്ങൾ കണ്ടെത്തുന്നു
        const matches = allStudents.filter(s => s.chestNumber === chest);
        
        itemSelect.innerHTML = '<option value="">മത്സരം സെലക്ട് ചെയ്യുക</option>';

        if (matches.length > 0) {
            display.innerHTML = `കുട്ടി: <strong>${matches[0].name}</strong>`;
            
            // കുട്ടി രജിസ്റ്റർ ചെയ്ത മത്സരങ്ങൾ ഡ്രോപ്പ്ഡൗണിലേക്ക് ആഡ് ചെയ്യുന്നു
            matches.forEach(m => {
                const option = document.createElement('option');
                option.value = m.item;
                option.text = m.item;
                itemSelect.appendChild(option);
            });
        } else {
            display.innerText = chest ? "കുട്ടിയെ കണ്ടെത്തിയില്ല!" : "";
        }
    }

    async function submitJudgement() {
        const chestNumber = document.getElementById('chestNumber').value.trim();
        const item = document.getElementById('itemSelect').value;
        const place = document.getElementById('place').value;
        const grade = document.getElementById('grade').value;
        const msg = document.getElementById('msg');

        if(!chestNumber || !item) {
            alert("ദയവായി ചെസ്റ്റ് നമ്പറും മത്സരവും സെലക്ട് ചെയ്യുക!");
            return;
        }

        msg.innerText = "Saving...";
        msg.style.color = "blue";

        const response = await fetch('/api/submit-judgement', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chestNumber, item, place, grade })
        });

        const result = await response.json();
        if (result.success) {
            msg.innerText = "വിവരങ്ങൾ വിജയകരമായി ചേർത്തു! ✅";
            msg.style.color = "green";
            document.getElementById('chestNumber').value = '';
            document.getElementById('itemSelect').innerHTML = '<option value="">ആദ്യം ചെസ്റ്റ് നമ്പർ അടിക്കുക</option>';
            document.getElementById('place').value = '';
            document.getElementById('grade').value = '';
            document.getElementById('studentDisplay').innerText = '';
            fetchStudents(); // ലിസ്റ്റ് പുതുക്കുന്നു
        } else {
            msg.innerText = "Error: " + result.error;
            msg.style.color = "red";
        }
    }
</script>

</body>
</html>
