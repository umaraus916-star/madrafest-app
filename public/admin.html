<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrafest Admin - Add/Delete</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background: white; max-width: 900px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .form-section { background: #eef2f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, select { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; background: #27ae60; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #34495e; color: white; }
        .del-btn { background: #c0392b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ അഡ്മിൻ കൺട്രോൾ പാനൽ</h1>
    
    <div class="form-section">
        <h3>➕ പുതിയ കുട്ടിയെ ചേർക്കുക</h3>
        <input type="text" id="chestNumber" placeholder="Chest Number">
        <input type="text" id="name" placeholder="Name">
        <select id="team"><option value="Badr">Badr</option><option value="Hira">Hira</option><option value="Furqan">Furqan</option></select>
        <input type="text" id="item" placeholder="Item Name">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <h3>📋 ആകെ രജിസ്റ്റർ ചെയ്ത കുട്ടികൾ</h3>
    <table id="adminTable">
        <thead><tr><th>Chest No</th><th>Name</th><th>Team</th><th>Item</th><th>Action</th></tr></thead>
        <tbody id="adminTableBody"></tbody>
    </table>
</div>

<script>
    async function loadAdminData() {
        const response = await fetch('/api/results');
        const data = await response.json();
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';
        data.forEach(s => {
            tbody.innerHTML += `<tr>
                <td>${s.chestNumber}</td><td>${s.name}</td><td>${s.team}</td><td>${s.item}</td>
                <td><button class="del-btn" onclick="deleteEntry('${s.chestNumber}', '${s.item}')">Delete</button></td>
            </tr>`;
        });
    }

    async function addStudent() {
        const student = {
            chestNumber: document.getElementById('chestNumber').value,
            name: document.getElementById('name').value,
            team: document.getElementById('team').value,
            item: document.getElementById('item').value
        };
        await fetch('/api/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(student)
        });
        alert('കുട്ടിയെ വിജയകരമായി ചേർത്തു!');
        loadAdminData();
    }

    async function deleteEntry(chestNumber, item) {
        if(confirm('ഈ എൻട്രി ഡിലീറ്റ് ചെയ്യണോ?')) {
            await fetch('/api/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chestNumber, item })
            });
            loadAdminData();
        }
    }

    loadAdminData();
</script>
</body>
</html>
