<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control & Reports</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .container { background: white; max-width: 800px; margin: auto; padding: 25px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        
        /* റിപ്പോർട്ട് സെക്ഷൻ സ്റ്റൈൽ */
        .report-section { background: #eef2f3; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ccc; }
        .report-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
        .download-btn { background-color: #27ae60; color: white; border: none; padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .download-btn:hover { background-color: #219150; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ അഡ്മിൻ കൺട്രോൾ പാനൽ & റിപ്പോർട്ടുകൾ</h2>
    
    <div class="report-section">
        <h3>📊 റിപ്പോർട്ടുകൾ ഡൗൺലോഡ് ചെയ്യുക (Excel/CSV)</h3>
        <div class="report-grid">
            <button class="download-btn" onclick="exportCallList()">📞 കോൾ ലിസ്റ്റ് (Call List)</button>
            <button class="download-btn" onclick="exportValuationSheet()">📝 വാല്യൂവേഷൻ ഷീറ്റ്</button>
            <button class="download-btn" onclick="exportWinnersList()">🏆 വിജയികളുടെ ലിസ്റ്റ്</button>
            <button class="download-btn" onclick="exportGroupScores()">📈 ഗ്രൂപ്പ് പോയിന്റ് റിപ്പോർട്ട്</button>
        </div>
    </div>

    <h3>📋 രജിസ്റ്റർ ചെയ്ത മുഴുവൻ വിവരങ്ങളും</h3>
    <table>
        <thead>
            <tr>
                <th>Chest No</th>
                <th>Name</th>
                <th>Item</th>
                <th>Group</th>
                <th>Place</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="adminTableBody">
            </tbody>
    </table>
</div>

<script>
    let allEntries = [];

    async function loadAdminData() {
        const response = await fetch('/api/results-all');
        if(response.ok) {
            allEntries = await response.json();
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            
            allEntries.forEach((student, index) => {
                const row = `<tr>
                    <td>${student.chestNumber}</td>
                    <td>${student.name}</td>
                    <td>${student.item}</td>
                    <td>${student.team}</td>
                    <td>${student.place ? student.place : '-'}</td>
                    <td>${student.grade ? student.grade : '-'}</td>
                    <td><button class="delete-btn" onclick="deleteEntry(${index})">Delete</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    }

    // 1. കോൾ ലിസ്റ്റ് എക്സ്പോർട്ട് (Call List)
    function exportCallList() {
        let csv = 'Chest Number,Name,Group,Item\n';
        allEntries.forEach(s => {
            csv += `"${s.chestNumber}","${s.name}","${s.team}","${s.item}"\n`;
        });
        downloadCSV(csv, 'Madrafest_Call_List.csv');
    }

    // 2. വാല്യൂവേഷൻ ഷീറ്റ് എക്സ്പോർട്ട് (Valuation Sheet - കുട്ടികളുടെ പേര് ഉണ്ടാകില്ല)
    function exportValuationSheet() {
        let csv = 'Item,Chest Number,Place (1st/2nd/3rd),Grade (A+/A/B),Signature\n';
        // മത്സരയിനത്തിന്റെ അടിസ്ഥാനത്തിൽ സോർട്ട് ചെയ്യുന്നു
        const sorted = [...allEntries].sort((a,b) => a.item.localeCompare(b.item));
        sorted.forEach(s => {
            csv += `"${s.item}","${s.chestNumber}","","",""\n`;
        });
        downloadCSV(csv, 'Madrafest_Valuation_Sheet.csv');
    }

    // 3. വിജയികളുടെ ലിസ്റ്റ് (Winners List)
    function exportWinnersList() {
        let csv = 'Item,Place,Chest Number,Name,Group,Grade\n';
        const winners = allEntries.filter(s => s.place);
        winners.sort((a,b) => a.item.localeCompare(b.item) || a.place - b.place);
        winners.forEach(s => {
            csv += `"${s.item}","${s.place}","${s.chestNumber}","${s.name}","${s.team}","${s.grade}"\n`;
        });
        downloadCSV(csv, 'Madrafest_Winners_List.csv');
    }

    // 4. ഗ്രൂപ്പ് പോയിന്റ് റിപ്പോർട്ട്
    function exportGroupScores() {
        let totalBadr = 0; let totalHira = 0; let totalFurqan = 0;
        allEntries.forEach(s => {
            let pts = 0;
            if(s.place === "1") pts += 5;
            else if(s.place === "2") pts += 3;
            else if(s.place === "3") pts += 1;
            
            if(s.grade === "A+") pts += 5;
            else if(s.grade === "A") pts += 3;
            else if(s.grade === "B") pts += 1;

            if (s.team === 'Badr') totalBadr += pts;
            if (s.team === 'Hira') totalHira += pts;
            if (s.team === 'Furqan') totalFurqan += pts;
        });

        let csv = 'Group Name,Total Points\n';
        csv += `"BADR","${totalBadr}"\n`;
        csv += `"HIRA","${totalHira}"\n`;
        csv += `"FURQAN","${totalFurqan}"\n`;
        
        downloadCSV(csv, 'Madrafest_Group_Standings.csv');
    }

    // CSV ഫയൽ ഫോണിലേക്ക്/കമ്പ്യൂട്ടറിലേക്ക് ഡൗൺലോഡ് ചെയ്യിക്കുന്ന കോമൺ ഫങ്ക്ഷൻ
    function downloadCSV(csvContent, fileName) {
        // മലയാളം അക്ഷരങ്ങൾ എക്സലിൽ കറക്റ്റ് ആയി വരാൻ BOM (Byte Order Mark) ചേർക്കുന്നു
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // ഡിലീറ്റ് ഫങ്ക്ഷൻ (ബാക്ക്-എൻഡ് വഴി ഡിലീറ്റ് ചെയ്യാൻ)
    async function deleteEntry(index) {
        if(confirm("ഈ എൻട്രി പൂർണ്ണമായി ഡിലീറ്റ് ചെയ്യണമെന്നുറപ്പാണോ?")) {
            const response = await fetch('/api/delete-student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            });
            if(response.ok) {
                loadAdminData();
            }
        }
    }

    loadAdminData();
</script>

</body>
</html>
