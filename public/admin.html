<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrafest Admin Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background: white; max-width: 950px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .top-btns { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .add-btn { background: #27ae60; color: white; }
        .pdf-btn { background: #e74c3c; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #34495e; color: white; }
        .del-btn { background: #c0392b; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ അഡ്മിൻ കൺട്രോൾ പാനൽ</h1>
    
    <div class="top-btns">
        <a href="add.html" class="btn add-btn">+ പുതിയ കുട്ടിയെ ചേർക്കുക</a>
        <button class="btn pdf-btn" onclick="generatePDF('call_list')">📄 കോൾ ലിസ്റ്റ് (PDF)</button>
        <button class="btn pdf-btn" onclick="generatePDF('winners_list')">🏆 വിജയികൾ (PDF)</button>
    </div>

    <h3>📋 ആകെ രജിസ്റ്റർ ചെയ്ത കുട്ടികൾ (${allDataLength} പേർ)</h3>
    <table id="adminTable">
        <thead>
            <tr>
                <th>Chest No</th>
                <th>Name</th>
                <th>Team</th>
                <th>Item</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
    </table>
</div>

<script>
    let allData = [];

    async function loadAdminData() {
        const response = await fetch('/api/results');
        allData = await response.json();
        
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';
        
        allData.forEach(s => {
            tbody.innerHTML += `<tr>
                <td>${s.chestNumber}</td>
                <td>${s.name}</td>
                <td>${s.team}</td>
                <td>${s.item}</td>
                <td><button class="del-btn" onclick="deleteEntry('${s.chestNumber}', '${s.item}')">Delete</button></td>
            </tr>`;
        });
    }

    async function deleteEntry(chestNumber, item) {
        if(confirm('ഈ എൻട്രി ഡിലീറ്റ് ചെയ്യണോ?')) {
            await fetch('/api/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chestNumber, item })
            });
            loadAdminData();
        }
    }

    loadAdminData();
</script>
</body>
</html>
